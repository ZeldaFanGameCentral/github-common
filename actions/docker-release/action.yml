name: Docker Release to GHCR
description: >
  Builds a Docker image and pushes it to GitHub Container Registry.
  Tags with both the given tag and :latest.

inputs:
  image_name:
    description: Image name (e.g., zfgbb, zfgbb-react)
    required: true
  docker_target:
    description: Dockerfile target stage (e.g., deploy, app)
    required: true
  build_args:
    description: Docker build-args (multi-line, one per line)
    required: false
    default: ""
  tag:
    description: Image tag (defaults to first 12 chars of GITHUB_SHA)
    required: false
    default: ""
  registry_token:
    description: Token for GHCR authentication (pass secrets.GITHUB_TOKEN)
    required: true

outputs:
  tag:
    description: The image tag that was pushed
    value: ${{ steps.meta.outputs.tag }}

runs:
  using: composite
  steps:
    - id: meta
      shell: bash
      run: |
        echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ inputs.image_name }}" >> "$GITHUB_ENV"
        tag="${{ inputs.tag }}"
        if [[ -z "$tag" ]]; then tag="${GITHUB_SHA::12}"; fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"

    - uses: docker/setup-buildx-action@v4

    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry_token }}

    - uses: docker/build-push-action@v7
      with:
        context: .
        target: ${{ inputs.docker_target }}
        push: true
        provenance: false
        build-args: ${{ inputs.build_args }}
        tags: |
          ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          ${{ env.IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
